<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arizsanta FM</title>
</head>
<body style="background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0;">
    
    <h2 style="color:#fff; font-family:sans-serif;">ARIZSANTA FM ESTÉREO</h2>
    
    <audio id="miAudio" controls style="width: 80%;">
        <source src="https://radio35.virtualtronics.com:20037/stream" type="audio/mpeg">
    </audio>

    <script>
        // Esto obliga a intentar reproducir apenas carga la página
        var audio = document.getElementById("miAudio");
        window.onload = function() {
            audio.play().catch(function() {
                console.log("El navegador bloqueó el autoplay, esperando interacción.");
            });
        };
    </script>
</body>
</html>
